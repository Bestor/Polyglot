name: Deploy

on:
  push:
    branches: [main]

# A second, free layer on top of the Terraform S3 backend's own
# use_lockfile-based locking (see terraform/main.tf) - queues overlapping
# runs instead of racing them.
concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  GHCR_IMAGE: ghcr.io/bestor/valorantanalyzer

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - run: go build ./...
      - run: go vet ./...
      - run: go test ./...

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.GHCR_IMAGE }}:latest
            ${{ env.GHCR_IMAGE }}:sha-${{ github.sha }}

  provision:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SPACES_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SPACES_SECRET_ACCESS_KEY }}
      DIGITALOCEAN_TOKEN: ${{ secrets.DIGITALOCEAN_TOKEN }}
      TF_VAR_do_ssh_public_key: ${{ secrets.DEPLOY_SSH_PUBLIC_KEY }}
      TF_VAR_api_auth_token: ${{ secrets.API_AUTH_TOKEN }}
      TF_VAR_henrik_api_key: ${{ secrets.HENRIK_API_KEY }}
      TF_VAR_discord_bot_token: ${{ secrets.DISCORD_BOT_TOKEN }}
      TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
      TF_VAR_superuser_email: ${{ secrets.SUPERUSER_EMAIL }}
      TF_VAR_superuser_password: ${{ secrets.SUPERUSER_PASSWORD }}
    outputs:
      droplet_ip: ${{ steps.tf-output.outputs.droplet_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.10.5"

      - run: terraform init
        working-directory: terraform

      - run: terraform apply -auto-approve
        working-directory: terraform

      - id: tf-output
        run: echo "droplet_ip=$(terraform output -raw droplet_ip)" >> "$GITHUB_OUTPUT"
        working-directory: terraform

  deploy:
    needs: provision
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ needs.provision.outputs.droplet_ip }}
          username: root
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          script: |
            cd /opt/val-analyzer
            git pull
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
