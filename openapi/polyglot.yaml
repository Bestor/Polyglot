openapi: 3.1.0
info:
  title: polyglot Data API
  version: "0.1.0"
  description: |
    polyglot is the standalone data layer for val-analyzer's Valorant stats backend. It owns
    the PocketBase-embedded SQLite database and exposes it behind a small, engine-agnostic
    REST contract: submit ANSI-compliant SQL to read cached data, trigger named "warm"
    functions to pull fresh data in from the upstream (severely rate-limited) Riot/HenrikDev
    API, and introspect the live schema. The name reflects the intent that callers speak one
    SQL dialect (ANSI SQL) while polyglot handles whatever storage engine actually backs it
    (SQLite via PocketBase today).

    polyglot has no AI/reasoning logic of its own - it is a pure data API. A separate MCP
    server wraps these endpoints as tools for an AI model to call when answering a user's
    question.

    polyglot also has no built-in domain knowledge: every table and every `/warm` function
    comes from a DataProvider (see `internal/dataprovider`) onboarded at runtime via
    `POST /datasources`. Valorant is the DataProvider that ships with this repo, but the
    same API can host other domains (e.g. NFL, chess.com) as additional compiled-in
    provider types are added and onboarded.

servers:
  - url: http://localhost:8090
    description: Local Docker container (see run.sh)

security:
  - bearerAuth: []

paths:
  /query:
    get:
      operationId: query
      summary: Run a read-only ANSI SQL query
      description: |
        Executes a single `SELECT` or `WITH` statement against the database and returns
        matching rows as JSON objects keyed by column name. The query runs against a
        read-only connection as the primary safety boundary; the SELECT/WITH prefix check is
        defense in depth on top of that, not the main guarantee. Include your own
        `LIMIT`/`OFFSET` in the SQL text - polyglot does not layer separate pagination
        parameters on top of the query, it only enforces a hard server-side cap on rows
        returned (see `truncated` in the response).
      parameters:
        - name: sql
          in: query
          required: true
          schema:
            type: string
          description: An ANSI-compliant SQL `SELECT` or `WITH` statement.
          example: "SELECT name, tag, region FROM players WHERE tag = 'NA1' LIMIT 10"
      responses:
        "200":
          description: Query executed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
              example:
                rows:
                  - puuid: "abc123"
                    name: "OrBest"
                    tag: "NA1"
                row_count: 1
                truncated: false
        "400":
          description: The query is missing, empty, or not a SELECT/WITH statement.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: The query failed to execute (syntax error, unknown table/column, timeout).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /warm:
    post:
      operationId: warm
      summary: Invoke a named data-fill function
      description: |
        Calls one of the functions advertised by `GET /metadata`'s `functions` list (e.g.
        resolving a Riot ID into a cached player, or syncing a player's match history from the
        upstream API) with the given arguments. This is the only way polyglot talks to the
        upstream, rate-limited data source - `GET /query` only ever reads what's already
        cached locally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WarmRequest"
            example:
              datasource: valorant
              function: sync_matches
              args:
                player_tag: "OrBest#NA1"
                start_date: "2026-05-01"
                count: 100
      responses:
        "200":
          description: Function ran successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WarmResponse"
              example:
                function: sync_matches
                summary: "synced 12 new matches (skipped 3 already cached) for OrBest#NA1, puuid abc123"
                data:
                  fetched: 12
                  skipped: 3
                  history_exhausted: false
        "400":
          description: Unknown function name, or a missing/invalid required argument.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: The function failed while running (e.g. an upstream sync error).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /metadata:
    get:
      operationId: getMetadata
      summary: Describe the live database schema and available warm functions
      description: |
        Introspects the live database and returns every table's columns and types, merged
        with hand-authored descriptions giving semantic context (units, enum meanings, join
        hints, etc.), plus the list of functions callable via `POST /warm` and the arguments
        each one accepts. This is the discovery mechanism an MCP client or AI model uses to
        know what it can query and what data-fill functions exist, without reading polyglot's
        source.
      responses:
        "200":
          description: Current schema and function metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
              example:
                tables:
                  - name: players
                    description: "Cached Riot account identities."
                    datasource: valorant
                    columns:
                      - name: puuid
                        type: text
                        description: "Riot's globally unique player id."
                      - name: name
                        type: text
                        description: "Riot ID name, before the #."
                functions:
                  - name: resolve_player
                    description: "Resolve a Riot ID (name#tag) into a cached player identity."
                    datasource: valorant
                    args:
                      - name: name
                        type: string
                        required: true
                        description: "Riot ID name, before the #."
                      - name: tag
                        type: string
                        required: true
                        description: "Riot ID tag, after the #."
                  - name: sync_matches
                    description: "Fetch and cache a player's matches from the upstream Valorant API."
                    datasource: valorant
                    args:
                      - name: player_tag
                        type: string
                        required: true
                        description: 'The player''s Riot ID as name#tag, e.g. "OrBest#NA1".'
                      - name: start_date
                        type: string
                        required: false
                        description: "ISO-8601 date, earliest match start date to ensure is cached."
                      - name: end_date
                        type: string
                        required: false
                        description: "ISO-8601 date, latest match start date to ensure is cached."
                      - name: count
                        type: integer
                        required: false
                        description: "Safety cap on how many matches to fetch this call."
        "401":
          $ref: "#/components/responses/Unauthorized"

  /datasources:
    get:
      operationId: listDatasources
      summary: List available provider types and active datasources
      description: |
        Describes every compiled-in DataProvider type (its config schema, for onboarding) and
        every currently active datasource instance (its tables and functions). This is the
        discovery mechanism for what can be onboarded and what already has been, without
        reading polyglot's source.
      responses:
        "200":
          description: Current provider types and active datasources.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DatasourcesResponse"
              example:
                available_types:
                  - type: valorant
                    config:
                      - name: henrik_api_key
                        type: string
                        required: true
                        secret: true
                        description: "HenrikDev API key."
                      - name: henrik_base_url
                        type: string
                        required: false
                        secret: false
                        description: "Base URL of the HenrikDev API. Defaults to https://api.henrikdev.xyz."
                active:
                  - type: valorant
                    tables: [players, seasons, maps, matches]
                    functions: [resolve_player, sync_matches]
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: onboardDatasource
      summary: Onboard (or reconfigure) a datasource
      description: |
        Validates config against the named provider type's config schema, ensures its tables
        exist (creating any that don't yet - see DataProvider in internal/dataprovider),
        activates it, and persists the registration so it survives a restart. Re-onboarding an
        already-active type is an idempotent upsert: its stored config is replaced and a fresh
        instance is bound.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardRequest"
            example:
              type: valorant
              config:
                henrik_api_key: "..."
      responses:
        "200":
          description: Datasource onboarded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardResponse"
              example:
                type: valorant
                tables: [players, seasons, maps, matches]
                functions: [resolve_player, sync_matches]
                config:
                  henrik_api_key: "***"
        "400":
          description: Unknown provider type, or missing/invalid required config field.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: One of this provider's tables is already owned by a different active datasource.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Static shared-secret bearer token, constant-time compared server-side. Not a per-user
        identity.

  responses:
    Unauthorized:
      description: Missing or invalid bearer token.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      description: PocketBase's standard API error envelope.
      required: [status, message, data]
      properties:
        status:
          type: integer
          example: 400
        message:
          type: string
          example: "invalid request body"
        data:
          type: object
          additionalProperties: true

    Row:
      type: object
      description: One result row, keyed by column name.
      additionalProperties:
        type: [string, number, boolean, "null"]

    QueryResponse:
      type: object
      required: [rows, row_count, truncated]
      properties:
        rows:
          type: array
          items:
            $ref: "#/components/schemas/Row"
        row_count:
          type: integer
          minimum: 0
          description: Number of rows in `rows`.
        truncated:
          type: boolean
          description: True if the server-side row safety cap cut off further results.

    WarmRequest:
      type: object
      required: [datasource, function, args]
      properties:
        datasource:
          type: string
          description: The active datasource (provider type) to invoke the function on, per GET /datasources.
          example: valorant
        function:
          type: string
          description: Name of a function advertised by GET /metadata's `functions` list.
          example: sync_matches
        args:
          type: object
          description: Function-specific arguments; see GET /metadata for each function's argument list.
          additionalProperties: true

    WarmResponse:
      type: object
      required: [function, summary]
      properties:
        function:
          type: string
        summary:
          type: string
          description: Human/AI-readable summary of what the function did.
        data:
          type: object
          description: Function-specific structured result fields.
          additionalProperties: true

    ColumnDescription:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
          description: PocketBase field type (e.g. text, number, bool, date, relation).
        description:
          type: string
          description: Hand-authored semantic context; may be empty if no note exists for this column.

    TableDescription:
      type: object
      required: [name, datasource, columns]
      properties:
        name:
          type: string
        description:
          type: string
        datasource:
          type: string
          description: The datasource (provider type) this table belongs to.
        columns:
          type: array
          items:
            $ref: "#/components/schemas/ColumnDescription"

    FunctionArg:
      type: object
      required: [name, type, required]
      properties:
        name:
          type: string
        type:
          type: string
          description: Argument type (string, integer, boolean, ...).
        required:
          type: boolean
        description:
          type: string

    FunctionDescription:
      type: object
      required: [name, datasource, args]
      properties:
        name:
          type: string
        description:
          type: string
        datasource:
          type: string
          description: The datasource (provider type) this function belongs to.
        args:
          type: array
          items:
            $ref: "#/components/schemas/FunctionArg"

    MetadataResponse:
      type: object
      required: [tables, functions]
      properties:
        tables:
          type: array
          items:
            $ref: "#/components/schemas/TableDescription"
        functions:
          type: array
          items:
            $ref: "#/components/schemas/FunctionDescription"

    ConfigFieldDescription:
      type: object
      required: [name, type, required, secret]
      properties:
        name:
          type: string
        type:
          type: string
          description: A JSON-schema type, e.g. "string" | "integer" | "boolean".
        description:
          type: string
        required:
          type: boolean
        secret:
          type: boolean
          description: If true, this field's value is masked in onboarding responses and never logged.

    ProviderTypeDescription:
      type: object
      required: [type, config]
      properties:
        type:
          type: string
        config:
          type: array
          items:
            $ref: "#/components/schemas/ConfigFieldDescription"

    ActiveDatasourceDescription:
      type: object
      required: [type, tables, functions]
      properties:
        type:
          type: string
        tables:
          type: array
          items:
            type: string
        functions:
          type: array
          items:
            type: string

    DatasourcesResponse:
      type: object
      required: [available_types, active]
      properties:
        available_types:
          type: array
          items:
            $ref: "#/components/schemas/ProviderTypeDescription"
        active:
          type: array
          items:
            $ref: "#/components/schemas/ActiveDatasourceDescription"

    OnboardRequest:
      type: object
      required: [type]
      properties:
        type:
          type: string
          description: A provider type from GET /datasources's `available_types` list.
          example: valorant
        config:
          type: object
          description: Provider-specific config; see GET /datasources for each provider type's config schema.
          additionalProperties: true

    OnboardResponse:
      type: object
      required: [type, tables, functions]
      properties:
        type:
          type: string
        tables:
          type: array
          items:
            type: string
        functions:
          type: array
          items:
            type: string
        config:
          type: object
          description: The config that was stored; fields marked secret in ConfigFieldDescription are masked.
          additionalProperties: true
